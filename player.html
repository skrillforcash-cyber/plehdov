<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrW-Zone Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --cyan:      #00aaff;
            --cyan-dim:  rgba(0,170,255,0.6);
            --bg:        #050505;
            --surface:   rgba(12,12,18,0.92);
            --glass:     rgba(255,255,255,0.06);
            --border:    rgba(255,255,255,0.1);
            --text:      #ffffff;
            --muted:     #888;
            --transition: 0.3s cubic-bezier(0.25,0.8,0.25,1);
            --hud-fade:  0.35s ease;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        html, body {
            width:100%; height:100%;
            overflow:hidden;
            background:var(--bg);
            font-family:'Outfit',sans-serif;
            color:var(--text);
            -webkit-user-select:none;
            user-select:none;
        }

        /* ── LOADING SCREEN ─────────────────────────────────────────────── */
        #loading-screen {
            position:fixed; inset:0; z-index:9999;
            display:flex; align-items:center; justify-content:center;
            flex-direction:column; gap:28px;
            background:var(--bg);
            transition:opacity 0.5s ease;
        }

        #loading-screen.fade-out { opacity:0; pointer-events:none; }

        #loading-poster-wrap {
            position:relative;
            width:140px; height:210px;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 0 60px rgba(0,170,255,0.25), 0 20px 50px rgba(0,0,0,0.8);
        }

        #loading-poster-img {
            width:100%; height:100%;
            object-fit:cover;
            display:block;
        }

        #loading-poster-placeholder {
            width:100%; height:100%;
            background:linear-gradient(135deg,#111 0%,#1a1a2e 100%);
            display:flex; align-items:center; justify-content:center;
            font-size:3rem; color:var(--cyan-dim);
        }

        #loading-title-wrap { text-align:center; }

        #loading-title {
            font-size:1.5rem; font-weight:800;
            background:linear-gradient(90deg,#fff,rgba(255,255,255,0.7));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-clip:text;
            margin-bottom:4px;
            max-width:340px;
        }

        #loading-subtitle { font-size:0.85rem; color:var(--muted); }

        .spinner-ring {
            width:48px; height:48px;
            border:3px solid rgba(255,255,255,0.08);
            border-top-color:var(--cyan);
            border-radius:50%;
            animation:spin 0.9s linear infinite;
        }

        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── PLAYER WRAP ────────────────────────────────────────────────── */
        #player-wrap {
            position:fixed; inset:0;
            display:none;
        }

        #player-iframe {
            position:absolute; inset:0;
            width:100%; height:100%;
            border:none;
            background:#000;
            z-index:1;
        }

        /* ── CLICK INTERCEPTOR (invisible, catches clicks for HUD toggle) ─ */
        #click-interceptor {
            position:absolute; inset:0;
            z-index:10;
            cursor:none;
        }

        #click-interceptor.controls-visible { cursor:default; }

        /* ── HUD COMMON ─────────────────────────────────────────────────── */
        .hud {
            position:absolute;
            z-index:20;
            opacity:0;
            pointer-events:none;
            transition:opacity var(--hud-fade);
        }

        .hud.visible { opacity:1; pointer-events:auto; }

        /* ── HUD TOP ────────────────────────────────────────────────────── */
        #hud-top {
            top:0; left:0; right:0;
            padding:20px 28px 60px;
            background:linear-gradient(to bottom,rgba(0,0,0,0.85) 0%,transparent 100%);
            display:flex;
            align-items:center;
            gap:18px;
        }

        #btn-back-hud {
            width:44px; height:44px;
            border-radius:50%;
            background:rgba(0,0,0,0.5);
            border:1px solid var(--border);
            color:var(--text);
            font-size:1.1rem;
            cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            backdrop-filter:blur(8px);
            flex-shrink:0;
            transition:var(--transition);
        }

        #btn-back-hud:hover, #btn-back-hud.tv-focus {
            background:var(--cyan);
            border-color:var(--cyan);
        }

        #hud-title-block { flex:1; min-width:0; }

        #hud-title {
            font-size:1.1rem; font-weight:800;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }

        #hud-subtitle { font-size:0.78rem; color:var(--muted); margin-top:2px; }

        #hud-source-badge {
            font-size:0.7rem; font-weight:700;
            color:var(--cyan);
            background:rgba(0,170,255,0.12);
            border:1px solid rgba(0,170,255,0.3);
            padding:4px 10px; border-radius:20px;
            flex-shrink:0;
            letter-spacing:0.05em;
        }

        /* ── HUD BOTTOM ─────────────────────────────────────────────────── */
        #hud-bottom {
            bottom:0; left:0; right:0;
            padding:50px 28px 22px;
            background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 100%);
        }

        #progress-track {
            height:4px;
            background:rgba(255,255,255,0.2);
            border-radius:4px;
            overflow:hidden;
            cursor:pointer;
            margin-bottom:10px;
            transition:height 0.15s ease;
        }

        #progress-track:hover { height:7px; }

        #progress-fill {
            height:100%;
            background:linear-gradient(90deg,var(--cyan),#80e0ff);
            border-radius:4px;
            transition:width 0.25s linear;
            width:0%;
        }

        #hud-time-row {
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        #hud-time { font-size:0.82rem; color:rgba(255,255,255,0.8); font-weight:600; }

        #hud-btns { display:flex; gap:10px; }

        .hud-btn {
            width:36px; height:36px;
            border-radius:50%;
            background:rgba(255,255,255,0.1);
            border:1px solid var(--border);
            color:white;
            font-size:0.9rem;
            cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            transition:var(--transition);
        }

        .hud-btn:hover, .hud-btn.tv-focus {
            background:var(--cyan);
            border-color:var(--cyan);
        }

        /* ── PAUSE OVERLAY ──────────────────────────────────────────────── */
        #pause-overlay {
            position:absolute; inset:0;
            z-index:30;
            display:flex;
            opacity:0;
            pointer-events:none;
            transition:opacity 0.4s ease;
        }

        #pause-overlay.visible {
            opacity:1;
            pointer-events:auto;
        }

        /* Blurred backdrop */
        #pause-backdrop {
            position:absolute; inset:0;
            background:rgba(0,0,0,0.78);
            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
        }

        /* Inner card */
        #pause-card {
            position:relative; z-index:1;
            width:100%; height:100%;
            display:flex;
            align-items:center;
            padding:40px 6%;
            gap:48px;
            overflow-y:auto;
        }

        /* Poster */
        #pause-poster-wrap {
            flex-shrink:0;
            width:220px;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 30px 80px rgba(0,0,0,0.8),
                       0 0 40px rgba(0,170,255,0.15);
            border:1px solid var(--border);
        }

        #pause-poster-img {
            width:100%; display:block;
            aspect-ratio:2/3;
            object-fit:cover;
        }

        #pause-poster-placeholder {
            width:100%;
            aspect-ratio:2/3;
            background:linear-gradient(135deg,#111,#1a1a2e);
            display:flex; align-items:center; justify-content:center;
            font-size:4rem; color:var(--cyan-dim);
        }

        /* Info panel */
        #pause-info { flex:1; min-width:0; }

        #pause-eyebrow {
            font-size:0.72rem; font-weight:700;
            color:var(--cyan); letter-spacing:0.18em;
            text-transform:uppercase;
            margin-bottom:10px;
        }

        #pause-title {
            font-size:2.6rem; font-weight:900;
            line-height:1.1;
            margin-bottom:12px;
            text-shadow:0 4px 20px rgba(0,0,0,0.5);
        }

        #pause-meta {
            display:flex; gap:10px; flex-wrap:wrap;
            margin-bottom:18px;
        }

        .pmeta-tag {
            font-size:0.82rem; font-weight:600;
            padding:4px 12px; border-radius:6px;
            background:rgba(255,255,255,0.08);
            border:1px solid var(--border);
        }

        .pmeta-tag.rating { color:#ffd700; }

        #pause-overview {
            font-size:0.95rem; line-height:1.65;
            color:rgba(255,255,255,0.7);
            display:-webkit-box;
            -webkit-line-clamp:3;
            -webkit-box-orient:vertical;
            overflow:hidden;
            margin-bottom:28px;
            max-width:680px;
        }

        /* Progress in overlay */
        #pause-progress-wrap { margin-bottom:24px; }

        #pause-progress-track {
            height:5px;
            background:rgba(255,255,255,0.15);
            border-radius:5px;
            overflow:hidden;
            margin-bottom:8px;
        }

        #pause-progress-fill {
            height:100%;
            background:linear-gradient(90deg,var(--cyan),#80e0ff);
            border-radius:5px;
            transition:width 0.3s linear;
            width:0%;
        }

        #pause-time-label {
            font-size:0.82rem; color:var(--muted); font-weight:600;
        }

        /* Buttons */
        #pause-buttons {
            display:flex; gap:14px; flex-wrap:wrap;
            margin-bottom:24px;
        }

        .paus-btn {
            display:inline-flex; align-items:center; gap:9px;
            padding:13px 26px;
            border-radius:30px;
            font-family:inherit; font-size:0.95rem; font-weight:800;
            cursor:pointer; border:none;
            transition:var(--transition);
            outline:none;
        }

        .paus-btn:focus, .paus-btn.tv-focus {
            box-shadow:0 0 0 3px rgba(0,170,255,0.8);
        }

        #btn-resume {
            background:var(--cyan);
            color:#000;
            box-shadow:0 8px 24px rgba(0,170,255,0.35);
        }

        #btn-resume:hover, #btn-resume.tv-focus {
            background:#fff;
            box-shadow:0 8px 30px rgba(0,170,255,0.5);
        }

        #btn-restart {
            background:rgba(255,255,255,0.1);
            color:#fff;
            border:1px solid var(--border);
        }

        #btn-restart:hover, #btn-restart.tv-focus {
            background:rgba(255,255,255,0.2);
        }

        #btn-back-details {
            background:transparent;
            color:rgba(255,255,255,0.6);
            border:1px solid rgba(255,255,255,0.15);
        }

        #btn-back-details:hover, #btn-back-details.tv-focus {
            color:#fff;
            border-color:rgba(255,255,255,0.4);
            background:rgba(255,255,255,0.08);
        }

        /* Source selector */
        #source-strip {
            display:flex; align-items:center; gap:10px; flex-wrap:wrap;
        }

        #source-label {
            font-size:0.75rem; color:var(--muted);
            font-weight:600; letter-spacing:0.1em;
        }

        .src-btn {
            font-size:0.75rem; font-weight:700;
            padding:5px 14px; border-radius:20px;
            border:1px solid var(--border);
            background:transparent;
            color:var(--muted);
            cursor:pointer; font-family:inherit;
            transition:var(--transition);
            outline:none;
        }

        .src-btn:hover, .src-btn.tv-focus {
            border-color:var(--cyan);
            color:var(--cyan);
            background:rgba(0,170,255,0.1);
        }

        .src-btn.active {
            background:rgba(0,170,255,0.15);
            border-color:var(--cyan);
            color:var(--cyan);
        }

        /* ── SAVED TOAST ────────────────────────────────────────────────── */
        #save-toast {
            position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
            background:rgba(10,10,14,0.92);
            border:1px solid rgba(0,170,255,0.3);
            border-radius:10px;
            padding:10px 20px;
            font-size:0.82rem; color:var(--cyan);
            backdrop-filter:blur(12px);
            opacity:0; pointer-events:none;
            transition:opacity 0.4s ease;
            z-index:9999;
            display:flex; align-items:center; gap:8px;
            white-space:nowrap;
        }

        #save-toast.visible { opacity:1; }

        /* ── RESPONSIVE ─────────────────────────────────────────────────── */
        @media (max-width:700px) {
            #pause-card { flex-direction:column; align-items:flex-start; padding:20px 5%; gap:24px; }
            #pause-poster-wrap { width:120px; }
            #pause-title { font-size:1.8rem; }
            #pause-overview { -webkit-line-clamp:2; }
            .paus-btn { padding:11px 18px; font-size:0.85rem; }
        }

        @media (max-width:480px) {
            #pause-buttons { flex-direction:column; }
            .paus-btn { width:100%; justify-content:center; }
            #pause-title { font-size:1.5rem; }
        }
    </style>
</head>
<body>

<!-- ══ LOADING SCREEN ══════════════════════════════════════════════════════ -->
<div id="loading-screen">
    <div id="loading-poster-wrap">
        <div id="loading-poster-placeholder"><i class="fas fa-film"></i></div>
        <img id="loading-poster-img" src="" alt="" style="display:none;position:absolute;inset:0;">
    </div>
    <div id="loading-title-wrap">
        <div id="loading-title">Caricamento...</div>
        <div id="loading-subtitle"></div>
    </div>
    <div class="spinner-ring"></div>
</div>

<!-- ══ PLAYER WRAP ══════════════════════════════════════════════════════════ -->
<div id="player-wrap">

    <iframe id="player-iframe" allowfullscreen
            allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
            referrerpolicy="no-referrer"></iframe>

    <!-- Transparent click layer -->
    <div id="click-interceptor"></div>

    <!-- TOP HUD -->
    <div id="hud-top" class="hud">
        <button id="btn-back-hud" title="Indietro">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div id="hud-title-block">
            <div id="hud-title">—</div>
            <div id="hud-subtitle"></div>
        </div>
        <div id="hud-source-badge">—</div>
    </div>

    <!-- BOTTOM HUD -->
    <div id="hud-bottom" class="hud">
        <div id="progress-track" title="Avanzamento">
            <div id="progress-fill"></div>
        </div>
        <div id="hud-time-row">
            <div id="hud-time">0:00 / —:——</div>
            <div id="hud-btns">
                <button class="hud-btn" id="btn-toggle-pause" title="Pausa / Riprendi">
                    <i class="fas fa-pause"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- PAUSE OVERLAY -->
    <div id="pause-overlay">
        <div id="pause-backdrop"></div>
        <div id="pause-card">

            <div id="pause-poster-wrap">
                <div id="pause-poster-placeholder"><i class="fas fa-film"></i></div>
                <img id="pause-poster-img" src="" alt="" style="display:none;">
            </div>

            <div id="pause-info">
                <div id="pause-eyebrow">In pausa</div>
                <h1 id="pause-title">—</h1>
                <div id="pause-meta"></div>
                <p id="pause-overview"></p>

                <div id="pause-progress-wrap">
                    <div id="pause-progress-track">
                        <div id="pause-progress-fill"></div>
                    </div>
                    <div id="pause-time-label">0:00</div>
                </div>

                <div id="pause-buttons">
                    <button class="paus-btn" id="btn-resume">
                        <i class="fas fa-play"></i> RIPRENDI
                    </button>
                    <button class="paus-btn" id="btn-restart">
                        <i class="fas fa-redo"></i> RICOMINCIA
                    </button>
                    <button class="paus-btn" id="btn-back-details">
                        <i class="fas fa-list"></i> DETTAGLI
                    </button>
                </div>

                <div id="source-strip">
                    <span id="source-label">FONTE:</span>
                    <!-- injected by JS -->
                </div>
            </div>

        </div>
    </div>

</div><!-- /player-wrap -->

<!-- SAVE TOAST -->
<div id="save-toast">
    <i class="fas fa-bookmark"></i>
    <span id="save-toast-text"></span>
</div>

<script>
'use strict';

/* ════════════════════════════════════════════════════════════════════════════
   CONFIG
════════════════════════════════════════════════════════════════════════════ */
const API_KEY  = '56dd0eb5ddacfa471fda68c68a550eb1';
const IMG_BASE = 'https://image.tmdb.org/t/p/';

/* Video sources – easy to add/remove */
const SOURCES = {
    vixsrc: {
        label: 'VixSrc',
        movie: (id, start) =>
            `https://vixsrc.to/movie/${id}/?lang=it&autoplay=1&sottotitoli=off${start > 10 ? '&startAt='+start : ''}`,
        tv: (id, s, e, start) =>
            `https://vixsrc.to/tv/${id}/${s}/${e}/?lang=it&autoplay=1&sottotitoli=off${start > 10 ? '&startAt='+start : ''}`
    },
    vidsrc: {
        label: 'VidSrc',
        movie: (id) => `https://vidsrc.to/embed/movie/${id}`,
        tv:    (id, s, e) => `https://vidsrc.to/embed/tv/${id}/${s}/${e}`
    },
    autoembed: {
        label: 'AutoEmbed',
        movie: (id) => `https://autoembed.co/movie/tmdb/${id}`,
        tv:    (id, s, e) => `https://autoembed.co/tv/tmdb/${id}-${s}-${e}`
    }
};

/* ════════════════════════════════════════════════════════════════════════════
   URL PARAMS
════════════════════════════════════════════════════════════════════════════ */
const qp      = new URLSearchParams(window.location.search);
const TYPE    = qp.get('type');
const ID      = qp.get('id');
const SEASON  = qp.get('season')  || '1';
const EPISODE = qp.get('episode') || '1';
const START_AT = Math.max(0, parseInt(qp.get('startAt') || '0'));

if (!TYPE || !ID) { window.location.href = 'index.html'; }

/* Resume key – same schema as index.html */
const RESUME_KEY = TYPE === 'movie'
    ? `crw_r_movie_${ID}`
    : `crw_r_tv_${ID}_s${SEASON}_e${EPISODE}`;

/* ════════════════════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════════════════════ */
let metadata        = null;     // TMDB data
let totalDurSec     = 0;        // total duration in seconds (0 = unknown)
let watchedMs       = 0;        // accumulated watch time (ms) in this session
let lastTickAt      = null;     // timestamp of last timer tick
let watching        = false;    // is timer running?
let timerHandle     = null;
let currentSource   = 'vixsrc';
let overlayVisible  = false;
let hudTimer        = null;     // auto-hide HUD timeout
let iframeReady     = false;    // has iframe loaded?

/* ════════════════════════════════════════════════════════════════════════════
   TIMER – counts ONLY real watch time (excludes pauses / overlay time)
════════════════════════════════════════════════════════════════════════════ */
function startTimer() {
    if (watching) return;
    watching   = true;
    lastTickAt = Date.now();
    timerHandle = setInterval(tick, 200);
}

function stopTimer() {
    if (!watching) return;
    watching = false;
    if (lastTickAt) {
        watchedMs += Date.now() - lastTickAt;
        lastTickAt = null;
    }
    clearInterval(timerHandle);
    timerHandle = null;
}

function tick() {
    if (!watching || !lastTickAt) return;
    const now   = Date.now();
    watchedMs  += now - lastTickAt;
    lastTickAt  = now;
    updateProgressUI();
    // Auto-save every ~10 s
    const totalSec = START_AT + Math.floor(watchedMs / 1000);
    if (totalSec > 0 && Math.floor(watchedMs / 1000) % 10 === 0) saveProgress(false);
}

function currentPositionSec() {
    let ms = watchedMs;
    if (watching && lastTickAt) ms += Date.now() - lastTickAt;
    return START_AT + Math.floor(ms / 1000);
}

function saveProgress(toast = true) {
    const pos = currentPositionSec();
    if (pos < 5) return;
    try {
        localStorage.setItem(RESUME_KEY, JSON.stringify({ t: pos, ts: Date.now() }));
        if (toast) showToast(`Progresso salvato · ${fmtTime(pos)}`);
    } catch (e) { /* ignore */ }
}

function clearProgress() {
    try { localStorage.removeItem(RESUME_KEY); } catch (e) { /* ignore */ }
}

/* ════════════════════════════════════════════════════════════════════════════
   UI HELPERS
════════════════════════════════════════════════════════════════════════════ */
function fmtTime(s) {
    s = Math.max(0, Math.floor(s));
    const h   = Math.floor(s / 3600);
    const m   = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return h > 0
        ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
        : `${m}:${String(sec).padStart(2,'0')}`;
}

let toastTimer;
function showToast(text) {
    const el   = document.getElementById('save-toast');
    const span = document.getElementById('save-toast-text');
    if (!el || !span) return;
    span.textContent = text;
    el.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('visible'), 3000);
}

function updateProgressUI() {
    const pos  = currentPositionSec();
    const pct  = totalDurSec > 0 ? Math.min(100, (pos / totalDurSec) * 100) : 0;
    const timeStr  = fmtTime(pos);
    const totalStr = totalDurSec > 0 ? fmtTime(totalDurSec) : '—:——';

    // HUD bottom
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('hud-time').textContent       = `${timeStr} / ${totalStr}`;

    // Pause overlay
    document.getElementById('pause-progress-fill').style.width = pct + '%';
    document.getElementById('pause-time-label').textContent =
        totalDurSec > 0 ? `${timeStr} / ${totalStr}` : timeStr;
}

/* ════════════════════════════════════════════════════════════════════════════
   HUD AUTO-HIDE
════════════════════════════════════════════════════════════════════════════ */
function showHud() {
    document.getElementById('hud-top').classList.add('visible');
    document.getElementById('hud-bottom').classList.add('visible');
    document.getElementById('click-interceptor').classList.add('controls-visible');
    resetHudTimer();
}

function hideHud() {
    if (overlayVisible) return;
    document.getElementById('hud-top').classList.remove('visible');
    document.getElementById('hud-bottom').classList.remove('visible');
    document.getElementById('click-interceptor').classList.remove('controls-visible');
}

function resetHudTimer() {
    clearTimeout(hudTimer);
    if (!overlayVisible) hudTimer = setTimeout(hideHud, 4000);
}

/* ════════════════════════════════════════════════════════════════════════════
   PAUSE OVERLAY
════════════════════════════════════════════════════════════════════════════ */
function showPauseOverlay() {
    if (overlayVisible) return;
    overlayVisible = true;
    stopTimer();
    clearTimeout(hudTimer);

    const ov = document.getElementById('pause-overlay');
    ov.classList.add('visible');

    // Show HUD while overlay is open
    document.getElementById('hud-top').classList.add('visible');
    document.getElementById('hud-bottom').classList.add('visible');

    updateProgressUI();

    // Focus first button
    setTimeout(() => setFocus(document.getElementById('btn-resume')), 80);

    // Update icon
    document.querySelector('#btn-toggle-pause i').className = 'fas fa-play';
}

function hidePauseOverlay() {
    if (!overlayVisible) return;
    overlayVisible = false;

    document.getElementById('pause-overlay').classList.remove('visible');
    document.querySelector('#btn-toggle-pause i').className = 'fas fa-pause';

    startTimer();
    showHud();
}

function togglePauseOverlay() {
    overlayVisible ? hidePauseOverlay() : showPauseOverlay();
}

/* ════════════════════════════════════════════════════════════════════════════
   SOURCE MANAGEMENT
════════════════════════════════════════════════════════════════════════════ */
function buildEmbedUrl(sourceKey, startSec) {
    const s = SOURCES[sourceKey];
    if (!s) return SOURCES.vixsrc.movie(ID, startSec);
    return TYPE === 'movie'
        ? s.movie(ID, startSec)
        : s.tv(ID, SEASON, EPISODE, startSec);
}

function loadSource(sourceKey, startSec) {
    currentSource = sourceKey;
    iframeReady   = false;
    const iframe  = document.getElementById('player-iframe');
    iframe.src    = buildEmbedUrl(sourceKey, startSec ?? currentPositionSec());
    document.getElementById('hud-source-badge').textContent = SOURCES[sourceKey]?.label || sourceKey;
    updateSourceButtons();
}

function updateSourceButtons() {
    document.querySelectorAll('.src-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.src === currentSource);
    });
}

function buildSourceButtons() {
    const strip = document.getElementById('source-strip');
    Object.entries(SOURCES).forEach(([key, src]) => {
        const btn = document.createElement('button');
        btn.className     = 'src-btn paus-focusable';
        btn.dataset.src   = key;
        btn.textContent   = src.label;
        btn.setAttribute('tabindex', '0');
        btn.addEventListener('click', () => {
            if (key === currentSource) return;
            hidePauseOverlay();
            loadSource(key, currentPositionSec());
        });
        strip.appendChild(btn);
    });
    updateSourceButtons();
}

/* ════════════════════════════════════════════════════════════════════════════
   TV FOCUS MANAGEMENT (inside pause overlay)
════════════════════════════════════════════════════════════════════════════ */
const PAUSE_FOCUSABLES = [
    '#btn-resume', '#btn-restart', '#btn-back-details', '.src-btn'
];

function getPauseFocusables() {
    return Array.from(
        document.querySelectorAll(PAUSE_FOCUSABLES.join(', '))
    ).filter(el => {
        const r = el.getBoundingClientRect();
        return r.width > 0 && r.height > 0;
    });
}

function setFocus(el) {
    if (!el) return;
    document.querySelectorAll('.tv-focus').forEach(e => e.classList.remove('tv-focus'));
    el.focus({ preventScroll: true });
    el.classList.add('tv-focus');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function movePauseFocus(dir) {
    const items   = getPauseFocusables();
    const current = document.querySelector('.tv-focus') || document.activeElement;
    const idx     = items.indexOf(current);
    let next;
    if (dir === 'UP' || dir === 'LEFT')   next = items[(idx - 1 + items.length) % items.length];
    if (dir === 'DOWN' || dir === 'RIGHT') next = items[(idx + 1) % items.length];
    if (next) setFocus(next);
}

/* ════════════════════════════════════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════════════════════════════════════ */
function goBackToIndex() {
    stopTimer();
    saveProgress(false);
    window.location.href = 'index.html';
}

function restartPlayback() {
    clearProgress();
    watchedMs  = 0;
    lastTickAt = null;
    hidePauseOverlay();
    loadSource(currentSource, 0);
}

/* ════════════════════════════════════════════════════════════════════════════
   KEYBOARD / TV REMOTE
════════════════════════════════════════════════════════════════════════════ */
window.addEventListener('keydown', (e) => {
    const key = e.keyCode;

    // Show HUD on any keypress
    if (!overlayVisible) showHud();

    // Arrow keys
    if ([37, 38, 39, 40, 19, 20, 21, 22].includes(key)) {
        e.preventDefault();
        if (overlayVisible) {
            if (key === 38 || key === 19) movePauseFocus('UP');
            if (key === 40 || key === 20) movePauseFocus('DOWN');
            if (key === 37 || key === 21) movePauseFocus('LEFT');
            if (key === 39 || key === 22) movePauseFocus('RIGHT');
        }
        return;
    }

    // Enter / OK
    if ([13, 23, 66].includes(key) || e.key === 'Enter') {
        if (overlayVisible) {
            const focused = document.querySelector('.tv-focus') || document.activeElement;
            if (focused) { e.preventDefault(); focused.click(); }
        } else {
            e.preventDefault();
            showPauseOverlay();
        }
        return;
    }

    // Pause key (MEDIA_PAUSE) / Space
    if (key === 179 || e.code === 'Space' || e.key === 'MediaPlayPause') {
        e.preventDefault();
        togglePauseOverlay();
        return;
    }

    // Back / Escape
    const isBack = [27, 461, 10009, 4, 8].includes(key)
        || e.key === 'Escape' || e.key === 'GoBack' || e.key === 'BrowserBack';

    if (isBack) {
        e.preventDefault();
        e.stopImmediatePropagation();
        if (overlayVisible) {
            hidePauseOverlay();
        } else {
            goBackToIndex();
        }
    }
}, true);

/* Mouse / touch show HUD */
document.addEventListener('mousemove', showHud);
document.addEventListener('touchstart', showHud, { passive: true });

/* Click interceptor – toggle pause overlay */
document.getElementById('click-interceptor').addEventListener('click', (e) => {
    e.stopPropagation();
    togglePauseOverlay();
});

/* ════════════════════════════════════════════════════════════════════════════
   IFRAME EVENTS
════════════════════════════════════════════════════════════════════════════ */
document.getElementById('player-iframe').addEventListener('load', () => {
    if (iframeReady) return;
    iframeReady = true;

    // Hide loading screen
    const ls = document.getElementById('loading-screen');
    ls.classList.add('fade-out');
    setTimeout(() => { ls.style.display = 'none'; }, 550);

    // Show player
    document.getElementById('player-wrap').style.display = 'block';

    // Start timer
    startTimer();
    showHud();
});

/* ════════════════════════════════════════════════════════════════════════════
   BUTTON WIRING
════════════════════════════════════════════════════════════════════════════ */
document.getElementById('btn-back-hud').addEventListener('click', goBackToIndex);
document.getElementById('btn-toggle-pause').addEventListener('click', togglePauseOverlay);
document.getElementById('btn-resume').addEventListener('click', hidePauseOverlay);
document.getElementById('btn-restart').addEventListener('click', restartPlayback);
document.getElementById('btn-back-details').addEventListener('click', goBackToIndex);

/* ════════════════════════════════════════════════════════════════════════════
   SAVE ON UNLOAD (best-effort)
════════════════════════════════════════════════════════════════════════════ */
window.addEventListener('pagehide',  () => { stopTimer(); saveProgress(false); });
window.addEventListener('beforeunload', () => { stopTimer(); saveProgress(false); });

/* ════════════════════════════════════════════════════════════════════════════
   METADATA (TMDB)
════════════════════════════════════════════════════════════════════════════ */
async function fetchMetadata() {
    try {
        const res  = await fetch(`https://api.themoviedb.org/3/${TYPE}/${ID}?api_key=${API_KEY}&language=it-IT`);
        metadata   = await res.json();

        /* ── Title & subtitle ── */
        const title   = metadata.title || metadata.name || '';
        const year    = (metadata.release_date || metadata.first_air_date || '').split('-')[0];
        const rating  = metadata.vote_average ? metadata.vote_average.toFixed(1) : null;
        const typeLbl = TYPE === 'movie' ? 'Film' : 'Serie TV';

        let subtitle = '';
        if (TYPE === 'tv') subtitle = `Stagione ${SEASON} · Episodio ${EPISODE}`;

        /* ── Duration ── */
        if (TYPE === 'movie' && metadata.runtime > 0) {
            totalDurSec = metadata.runtime * 60;
        } else if (TYPE === 'tv' && metadata.episode_run_time?.length > 0) {
            totalDurSec = metadata.episode_run_time[0] * 60;
            // Try to get exact episode duration
            fetchEpisodeDuration(ID, SEASON, EPISODE);
        }

        /* ── Poster ── */
        const posterUrl = metadata.poster_path
            ? `${IMG_BASE}w500${metadata.poster_path}`
            : null;

        /* ── Loading screen ── */
        document.getElementById('loading-title').textContent = title;
        document.getElementById('loading-subtitle').textContent =
            subtitle || (year ? `${year} · ${typeLbl}` : typeLbl);
        if (posterUrl) {
            const pImg = document.getElementById('loading-poster-img');
            pImg.src = posterUrl;
            pImg.style.display = 'block';
            document.getElementById('loading-poster-placeholder').style.display = 'none';
        }

        /* ── HUD ── */
        document.getElementById('hud-title').textContent    = title;
        document.getElementById('hud-subtitle').textContent = subtitle;
        document.title = title + ' – CrW-Zone';

        /* ── Pause overlay ── */
        document.getElementById('pause-title').textContent    = title;
        document.getElementById('pause-overview').textContent = metadata.overview || 'Trama non disponibile.';

        const metaEl = document.getElementById('pause-meta');
        metaEl.innerHTML = '';
        if (rating) metaEl.insertAdjacentHTML('beforeend', `<span class="pmeta-tag rating"><i class="fas fa-star"></i> ${rating}</span>`);
        if (year)   metaEl.insertAdjacentHTML('beforeend', `<span class="pmeta-tag">${year}</span>`);
                    metaEl.insertAdjacentHTML('beforeend', `<span class="pmeta-tag">${typeLbl}</span>`);
        if (TYPE === 'tv') {
            metaEl.insertAdjacentHTML('beforeend', `<span class="pmeta-tag">S${SEASON} E${EPISODE}</span>`);
        }
        if (totalDurSec > 0) {
            metaEl.insertAdjacentHTML('beforeend', `<span class="pmeta-tag"><i class="fas fa-clock" style="margin-right:4px;color:#00aaff;"></i>${fmtTime(totalDurSec)}</span>`);
        }

        /* ── Poster in pause overlay ── */
        if (posterUrl) {
            const pi = document.getElementById('pause-poster-img');
            pi.src = posterUrl;
            pi.style.display = 'block';
            document.getElementById('pause-poster-placeholder').style.display = 'none';
        }

        updateProgressUI();

    } catch (e) {
        console.error('[CrW-Zone] Metadata error', e);
        document.getElementById('loading-title').textContent = TYPE === 'tv'
            ? `Serie TV – S${SEASON} E${EPISODE}`
            : 'Film';
    }
}

async function fetchEpisodeDuration(tvId, season, episode) {
    try {
        const res  = await fetch(
            `https://api.themoviedb.org/3/tv/${tvId}/season/${season}/episode/${episode}?api_key=${API_KEY}&language=it-IT`
        );
        const data = await res.json();
        if (data.runtime > 0) {
            totalDurSec = data.runtime * 60;
            updateProgressUI();
        }
    } catch (e) { /* ignore */ }
}

/* ════════════════════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════════════════════ */
function init() {
    if (!TYPE || !ID) return;

    // Build source selector buttons
    buildSourceButtons();

    // Fetch metadata in parallel with player load
    fetchMetadata();

    // Load first source
    loadSource('vixsrc', START_AT);
}

init();
</script>
